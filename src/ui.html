<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f0f0f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>mpv remote</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  background: #0f0f0f; color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; padding: 16px; gap: 12px; padding-bottom: 40px;
}

/* Header / now playing */
.now-playing {
  width: 100%; max-width: 420px;
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  border-radius: 16px; padding: 16px;
  display: flex; flex-direction: column; gap: 6px;
}
.np-label { font-size: 0.65rem; color: #555; text-transform: uppercase; letter-spacing: 1.5px; }
.np-title { font-size: 1rem; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.np-subtitle { font-size: 0.8rem; color: #888; }

#conn-status {
  font-size: 0.7rem; padding: 3px 10px; border-radius: 20px;
  background: #1a1a1a; color: #666; align-self: flex-end; margin-top: 4px;
}
#conn-status.connected { color: #4caf50; }
#conn-status.error { color: #f44336; }

/* Card */
.card { background: #1a1a1a; border-radius: 16px; padding: 16px; width: 100%; max-width: 420px; }
.card h2 { font-size: 0.7rem; color: #555; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }

/* Seek */
.seek-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.time { font-size: 0.75rem; color: #888; white-space: nowrap; }
input[type=range] {
  flex: 1; -webkit-appearance: none; height: 4px; border-radius: 2px;
  background: #333; outline: none; cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 16px; height: 16px;
  border-radius: 50%; background: #e53935; cursor: pointer;
}
#volume-bar::-webkit-slider-thumb { background: #fff; }

.seek-btns { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; }

/* Buttons */
.btn {
  background: #2a2a2a; border: none; border-radius: 12px; color: #fff;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background 0.12s, transform 0.1s; font-size: 0.8rem; font-weight: 500;
}
.btn:active { transform: scale(0.92); background: #383838; }
.btn-lg { width: 68px; height: 68px; font-size: 1.7rem; border-radius: 50%; }
.btn-md { width: 52px; height: 52px; font-size: 1.2rem; }
.btn-sm { padding: 6px 12px; height: 36px; border-radius: 8px; }
.btn-red { background: #c62828; }
.btn-red:active { background: #b71c1c; }
.btn-primary { background: #e53935; border-radius: 50%; }
.btn-primary:active { background: #c62828; }
.btn-stop { background: #333; color: #f44336; }

.main-controls { display: flex; justify-content: center; align-items: center; gap: 12px; }

/* Volume row */
.volume-row { display: flex; align-items: center; gap: 10px; }
.vol-icon { font-size: 1.1rem; }

/* Dropdown */
.dropdown-row { display: flex; flex-direction: column; gap: 8px; }
.dropdown-label { font-size: 0.75rem; color: #888; }
select {
  width: 100%; background: #2a2a2a; border: 1px solid #333;
  border-radius: 8px; color: #fff; padding: 8px 12px;
  font-size: 0.85rem; outline: none; cursor: pointer;
  -webkit-appearance: none; appearance: none;
}
select:focus { border-color: #e53935; }

/* Stop row */
.stop-row { display: flex; justify-content: center; }
</style>
</head>
<body>

<!-- Now playing -->
<div class="now-playing">
  <span class="np-label">Reproduzindo</span>
  <span class="np-title" id="np-title">—</span>
  <span class="np-subtitle" id="np-sub">Aguardando mpv...</span>
  <span id="conn-status">conectando...</span>
</div>

<!-- Seek -->
<div class="card">
  <h2>Posição</h2>
  <div class="seek-row">
    <span class="time" id="time-pos">0:00</span>
    <input type="range" id="seek-bar" min="0" max="100" value="0" step="0.1">
    <span class="time" id="time-dur">0:00</span>
  </div>
  <div class="seek-btns">
    <button class="btn btn-sm" onclick="seek(-60)">-60s</button>
    <button class="btn btn-sm" onclick="seek(-15)">-15s</button>
    <button class="btn btn-sm" onclick="seek(-5)">-5s</button>
    <button class="btn btn-sm" onclick="seek(5)">+5s</button>
    <button class="btn btn-sm" onclick="seek(15)">+15s</button>
    <button class="btn btn-sm" onclick="seek(60)">+60s</button>
  </div>
</div>

<!-- Controls -->
<div class="card">
  <h2>Controles</h2>
  <div class="main-controls">
    <button class="btn btn-md" onclick="seek(-15)">⏪</button>
    <button class="btn btn-lg btn-primary" id="play-btn" onclick="toggle()">⏸</button>
    <button class="btn btn-md" onclick="seek(15)">⏩</button>
    <button class="btn btn-md" onclick="fullscreen()">⛶</button>
  </div>
</div>

<!-- Volume -->
<div class="card">
  <h2>Volume</h2>
  <div class="volume-row">
    <span class="vol-icon">🔈</span>
    <input type="range" id="volume-bar" min="0" max="100" value="100" oninput="setVolume(this.value)">
    <span class="vol-icon">🔊</span>
  </div>
</div>

<!-- Audio track -->
<div class="card">
  <h2>Faixa de áudio</h2>
  <div class="dropdown-row">
    <span class="dropdown-label" id="audio-current">Nenhuma</span>
    <select id="audio-select" onchange="setAudio(this.value)">
      <option value="">Selecionar...</option>
    </select>
  </div>
</div>

<!-- Subtitles -->
<div class="card">
  <h2>Legenda</h2>
  <div class="dropdown-row">
    <span class="dropdown-label" id="sub-current">Desligada</span>
    <select id="sub-select" onchange="setSub(this.value)">
      <option value="no">Desligada</option>
    </select>
  </div>
</div>

<!-- Stop -->
<div class="card">
  <div class="stop-row">
    <button class="btn btn-sm btn-stop" onclick="stop()" style="width:100%;height:44px;font-size:0.9rem;">⏹ Parar reprodução</button>
  </div>
</div>

<script>
let ws, paused = false, duration = 0, seekDragging = false;
let currentAid = null, currentSid = null;

// MediaSession API (notificação Android)
function setupMediaSession(title, artist) {
  if (!('mediaSession' in navigator)) return;
  navigator.mediaSession.metadata = new MediaMetadata({ title, artist, album: 'mpv remote' });
  navigator.mediaSession.setActionHandler('play', () => send({ action: 'play' }));
  navigator.mediaSession.setActionHandler('pause', () => send({ action: 'pause' }));
  navigator.mediaSession.setActionHandler('seekbackward', () => seek(-15));
  navigator.mediaSession.setActionHandler('seekforward', () => seek(15));
  navigator.mediaSession.setActionHandler('stop', () => stop());
}

function updateMediaSessionPosition(pos, dur) {
  if (!('mediaSession' in navigator)) return;
  try {
    navigator.mediaSession.setPositionState({ duration: dur || 0, position: pos || 0, playbackRate: 1 });
  } catch {}
}

function connect() {
  ws = new WebSocket('ws://192.168.2.104:3000/ws');
  ws.onopen = () => { setStatus('conectado', 'connected'); };
  ws.onclose = () => { setStatus('desconectado', 'error'); setTimeout(connect, 2000); };
  ws.onerror = () => setStatus('erro', 'error');
  ws.onmessage = (e) => { try { handleMessage(JSON.parse(e.data)); } catch {} };
}

function setStatus(t, c) { const el = document.getElementById('conn-status'); el.textContent = t; el.className = c || ''; }
function send(msg) { if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(msg)); }

function handleMessage(data) {
  if (data.type === 'status') {
    // Title
    const title = data.title || '—';
    document.getElementById('np-title').textContent = title;

    // Paused state
    paused = !!data.paused;
    document.getElementById('play-btn').textContent = paused ? '▶' : '⏸';
    if ('mediaSession' in navigator) {
      navigator.mediaSession.playbackState = paused ? 'paused' : 'playing';
    }

    // Position / duration
    const pos = parseFloat(data.position) || 0;
    duration = parseFloat(data.duration) || 0;
    document.getElementById('time-pos').textContent = fmt(pos);
    document.getElementById('time-dur').textContent = fmt(duration);
    if (!seekDragging && duration > 0) {
      document.getElementById('seek-bar').value = (pos / duration) * 100;
    }

    // Subtitle: show position and duration
    const pct = duration > 0 ? Math.round((pos / duration) * 100) : 0;
    document.getElementById('np-sub').textContent =
      duration > 0 ? `${fmt(pos)} / ${fmt(duration)} · ${pct}%` : 'Ao vivo';

    // Volume
    if (data.volume != null) document.getElementById('volume-bar').value = data.volume;

    // Track list
    if (data.track_list) updateTracks(data.track_list, data.aid, data.sid);

    // MediaSession
    setupMediaSession(title, '');
    updateMediaSessionPosition(pos, duration);
  }
}

function updateTracks(tracks, aid, sid) {
  currentAid = aid;
  currentSid = sid;

  const audioSel = document.getElementById('audio-select');
  const subSel = document.getElementById('sub-select');

  const audioTracks = tracks.filter(t => t.type === 'audio');
  const subTracks = tracks.filter(t => t.type === 'sub');

  // Audio dropdown
  audioSel.innerHTML = '';
  audioTracks.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t.id;
    opt.textContent = `${t.id}. ${t.lang || ''} ${t.title || ''} ${t['codec'] || ''}`.trim();
    if (t.id == aid) opt.selected = true;
    audioSel.appendChild(opt);
  });
  const curAudio = audioTracks.find(t => t.id == aid);
  document.getElementById('audio-current').textContent =
    curAudio ? `Atual: ${curAudio.lang || ''} ${curAudio.title || curAudio.codec || ''}`.trim() : 'Nenhuma';

  // Sub dropdown
  subSel.innerHTML = '<option value="no">Desligada</option>';
  subTracks.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t.id;
    opt.textContent = `${t.id}. ${t.lang || ''} ${t.title || ''}`.trim();
    if (t.id == sid) opt.selected = true;
    subSel.appendChild(opt);
  });
  if (!sid || sid === 'no' || sid === false) subSel.value = 'no';
  const curSub = subTracks.find(t => t.id == sid);
  document.getElementById('sub-current').textContent =
    curSub ? `Atual: ${curSub.lang || ''} ${curSub.title || ''}`.trim() : 'Desligada';
}

function toggle() { send({ action: 'toggle' }); }
function seek(s) { send({ action: 'seek', seconds: s }); }
function setVolume(v) { send({ action: 'volume', value: parseFloat(v) }); }
function fullscreen() { send({ action: 'fullscreen' }); }
function stop() { send({ action: 'stop' }); }

function setAudio(id) {
  if (!id) return;
  send({ action: 'audio_track', id: parseInt(id) });
}

function setSub(id) {
  if (id === 'no') send({ action: 'subtitle_off' });
  else send({ action: 'subtitle_track', id });
}

function fmt(s) {
  s = Math.floor(s || 0);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  if (h > 0) return `${h}:${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
  return `${m}:${sec.toString().padStart(2,'0')}`;
}

// Seek bar
const seekBar = document.getElementById('seek-bar');
seekBar.addEventListener('mousedown', () => seekDragging = true);
seekBar.addEventListener('touchstart', () => seekDragging = true, { passive: true });
seekBar.addEventListener('mouseup', () => {
  seekDragging = false;
  if (duration > 0) send({ action: 'seek_abs', seconds: (seekBar.value / 100) * duration });
});
seekBar.addEventListener('touchend', () => {
  seekDragging = false;
  if (duration > 0) send({ action: 'seek_abs', seconds: (seekBar.value / 100) * duration });
});

// Poll every 3s
setInterval(() => send({ action: 'get_status' }), 3000);

// Silent audio to activate MediaSession
const silentAudio = new Audio("data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=");
silentAudio.loop = true;
silentAudio.volume = 0.001;

function activateSession() {
  silentAudio.play().catch(()=>{});
  document.removeEventListener("click", activateSession);
  document.removeEventListener("touchend", activateSession);
}
document.addEventListener("click", activateSession);
document.addEventListener("touchend", activateSession);

connect();
</script>
</body>
</html>
